<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Talk With Me</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>

<!-- ── Sign-in overlay — shown to unauthenticated visitors ───────────────── -->
<div class="name-overlay" id="signin-overlay"
     role="dialog" aria-modal="true" aria-labelledby="signin-title">
  <div class="name-card">

    <div class="name-avatar" id="signin-initials" aria-hidden="true">MA</div>

    <h2 class="name-card-title" id="signin-title">Welcome! 👋</h2>
    <p class="name-card-sub" id="signin-sub">
      Sign in to chat and save your conversations.
    </p>

    <a href="/auth/login" class="hf-signin-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
      </svg>
      Sign in with HuggingFace
    </a>

    <p class="signin-note">Free &nbsp;·&nbsp; No ads &nbsp;·&nbsp; Conversations saved</p>

  </div>
</div>

<!-- ── Header ──────────────────────────────────────────────────────────── -->
  <header class="header" role="banner">
    <div class="header-inner">
      <div class="header-brand">
        <div class="header-avatar" id="hdr-initials" aria-hidden="true">MA</div>
        <div class="header-text">
          <span class="header-name" id="hdr-name">Loading…</span>
          <span class="header-tagline" id="hdr-tagline"></span>
        </div>
      </div>
      <div class="header-right">
        <!-- Sign in — shown when not authenticated -->
        <a href="/auth/login" class="signin-btn" id="signin-btn" aria-label="Sign in with HuggingFace">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
          </svg>
          Sign in
        </a>

        <!-- User info — shown when authenticated -->
        <div class="header-user" id="header-user" hidden>
          <img class="header-user-avatar" id="header-user-avatar"
               src="" alt="Your avatar" width="28" height="28" />
          <span class="header-user-name" id="header-user-name"></span>
          <a href="/auth/logout" class="signout-link" aria-label="Sign out">Sign out</a>
        </div>

        <button class="theme-toggle" id="theme-toggle" aria-label="Switch to dark mode">
          <!-- icon injected by JS -->
        </button>
        <div class="header-status" aria-label="Availability status">
          <span class="pulse-dot" aria-hidden="true"></span>
          <span id="hdr-status">Available</span>
        </div>
      </div>
    </div>
  </header>

  <!-- ── Main layout ─────────────────────────────────────────────────────── -->
  <main class="layout" role="main">

    <!-- Profile sidebar -->
    <aside class="sidebar" aria-label="Profile information">
      <div class="card profile-card">

        <div class="profile-avatar" id="sb-initials" aria-hidden="true">MA</div>
        <p class="profile-name"  id="sb-name"></p>
        <p class="profile-title" id="sb-title"></p>
        <p class="profile-bio"   id="sb-tagline"></p>

        <hr class="divider" />

        <div class="skill-list" id="sb-skills" aria-label="Skills"></div>

        <hr class="divider" id="social-divider" hidden />
        <nav class="social-nav" id="sb-social" aria-label="Social links"></nav>

        <hr class="divider" />
        <div class="status-badge" role="status">
          <span class="status-dot" aria-hidden="true"></span>
          <span id="sb-status">Open to opportunities</span>
        </div>

      </div>

      <!-- History panel — visible only when signed in -->
      <div class="card history-panel" id="history-panel" hidden aria-label="Conversation history">
        <div class="history-head">
          <span class="history-label">Recent chats</span>
          <button class="new-chat-btn" id="new-chat-btn" aria-label="New conversation">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="3"
                 stroke-linecap="round" aria-hidden="true">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            New
          </button>
        </div>
        <div class="history-list" id="history-list" role="list"></div>
      </div>

    </aside>

    <!-- Chat panel -->
    <section class="chat-panel" aria-label="Chat">

      <!-- Message thread + scroll button share a relative wrapper -->
      <div class="messages-wrap">
        <div class="messages" id="messages"
             role="log" aria-live="polite" aria-label="Conversation"></div>

        <!-- Floats bottom-right of the messages area, not the whole panel -->
        <button class="scroll-btn" id="scroll-btn" aria-label="Scroll to bottom" hidden>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <polyline points="19 12 12 19 5 12"/>
          </svg>
        </button>
      </div>

      <!-- Typing indicator — shown while awaiting LLM response -->
      <div class="typing-row" id="typing" hidden aria-hidden="true">
        <div class="msg-avatar bot-avatar" id="typing-initials">MA</div>
        <div class="typing-bubble">
          <span></span><span></span><span></span>
        </div>
      </div>

      <!-- Input bar -->
      <div class="input-bar" role="form" aria-label="Send a message">
        <div class="input-shell" id="input-shell">
          <textarea
            id="msg-input"
            class="msg-input"
            placeholder="Ask me about my experience, skills, or projects…"
            rows="1"
            maxlength="2000"
            aria-label="Your message"
            aria-multiline="true"
          ></textarea>
          <button class="send-btn" id="send-btn" aria-label="Send message" disabled>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.5"
                 stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <line x1="12" y1="19" x2="12" y2="5"/>
              <polyline points="5 12 12 5 19 12"/>
            </svg>
          </button>
        </div>
        <p class="input-hint">
          <kbd>Enter</kbd> to send &nbsp;·&nbsp; <kbd>Shift+Enter</kbd> for new line
        </p>
      </div>

    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="/js/chat.js"></script>
</body>
</html>
