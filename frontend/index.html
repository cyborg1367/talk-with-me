<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Talk With Me</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>

<!-- ── Name overlay ───────────────────────────────────────────────────────── -->
<div class="name-overlay" id="name-overlay"
     role="dialog" aria-modal="true" aria-labelledby="overlay-title">
  <div class="name-card">

    <div class="name-avatar" id="overlay-initials" aria-hidden="true">MA</div>

    <h2 class="name-card-title" id="overlay-title">Welcome! 👋</h2>
    <p class="name-card-sub" id="overlay-sub">
      Before we start, what's your name?
    </p>

    <input
      type="text"
      id="name-input"
      class="name-input"
      placeholder="Enter your name…"
      maxlength="50"
      autocomplete="given-name"
      spellcheck="false"
      aria-label="Your name"
    />

    <button class="name-submit-btn" id="name-submit-btn" disabled>
      Start chatting
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="5" y1="12" x2="19" y2="12"/>
        <polyline points="12 5 19 12 12 19"/>
      </svg>
    </button>

  </div>
</div>

<!-- ── Header ────────────────────────────────────────────────────────────── -->
<header class="header" role="banner">
  <div class="header-inner">
    <div class="header-brand">
      <div class="header-avatar-wrap">
        <img class="header-avatar-img" id="hdr-photo" src="" alt="" hidden />
        <div class="header-avatar" id="hdr-initials" aria-hidden="true">MA</div>
      </div>
      <div class="header-text">
        <span class="header-name" id="hdr-name">Loading…</span>
        <span class="header-tagline" id="hdr-tagline"></span>
      </div>
    </div>
    <div class="header-right">
      <button class="clear-chat-btn" id="clear-chat-btn" aria-label="Start new chat">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
          <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.61"/>
        </svg>
        New chat
      </button>
      <button class="theme-toggle" id="theme-toggle" aria-label="Switch to dark mode">
        <!-- icon injected by JS -->
      </button>
      <div class="header-status" aria-label="Availability status">
        <span class="pulse-dot" aria-hidden="true"></span>
        <span id="hdr-status">Available</span>
      </div>
    </div>
  </div>
</header>

<!-- ── Main layout ───────────────────────────────────────────────────────── -->
<main class="layout" role="main">

  <!-- Profile sidebar -->
  <aside class="sidebar" aria-label="Profile information">
    <div class="card profile-card">

      <div class="profile-avatar-wrap">
        <img class="profile-avatar-img" id="sb-photo" src="" alt="Profile photo" hidden />
        <div class="profile-avatar" id="sb-initials" aria-hidden="true">MA</div>
      </div>
      <p class="profile-name"  id="sb-name"></p>
      <p class="profile-title" id="sb-title"></p>
      <p class="profile-bio"   id="sb-tagline"></p>

      <hr class="divider" />

      <div class="skill-list" id="sb-skills" aria-label="Skills"></div>

      <hr class="divider" id="social-divider" hidden />
      <nav class="social-nav" id="sb-social" aria-label="Social links"></nav>

      <hr class="divider" />
      <div class="status-badge" role="status">
        <span class="status-dot" aria-hidden="true"></span>
        <span id="sb-status">Open to opportunities</span>
      </div>

      <hr class="divider" />
      <a href="/projects.html" class="projects-sidebar-link" aria-label="View all projects">
        View All Projects →
      </a>

    </div>
  </aside>

  <!-- Chat panel -->
  <section class="chat-panel" aria-label="Chat">

    <div class="messages-wrap">
      <div class="messages" id="messages"
           role="log" aria-live="polite" aria-label="Conversation"></div>

      <button class="scroll-btn" id="scroll-btn" aria-label="Scroll to bottom" hidden>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <polyline points="19 12 12 19 5 12"/>
        </svg>
      </button>
    </div>

    <div class="typing-row" id="typing" hidden aria-hidden="true">
      <div class="msg-avatar bot-avatar" id="typing-initials">MA</div>
      <div class="typing-bubble">
        <span></span><span></span><span></span>
      </div>
    </div>

    <div class="input-bar" role="form" aria-label="Send a message">
      <div class="input-shell" id="input-shell">
        <button class="mic-btn" id="mic-btn" aria-label="Voice input" title="Voice input">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round"
               stroke-linejoin="round" aria-hidden="true">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </button>
        <textarea
          id="msg-input"
          class="msg-input"
          placeholder="Ask me about my experience, skills, or projects…"
          rows="1"
          maxlength="2000"
          aria-label="Your message"
          aria-multiline="true"
        ></textarea>
        <button class="send-btn" id="send-btn" aria-label="Send message" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="12" y1="19" x2="12" y2="5"/>
            <polyline points="5 12 12 5 19 12"/>
          </svg>
        </button>
      </div>
      <p class="input-hint">
        <kbd>Enter</kbd> to send &nbsp;·&nbsp; <kbd>Shift+Enter</kbd> for new line
      </p>
    </div>

  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="/js/chat.js"></script>
</body>
</html>
