<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Projects</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="stylesheet" href="/css/projects.css" />
</head>
<body class="projects-page">

<!-- ── Header ────────────────────────────────────────────────────────────── -->
<header class="header" role="banner">
  <div class="header-inner">
    <div class="header-brand">
      <div class="header-avatar" id="hdr-initials" aria-hidden="true">MA</div>
      <div class="header-text">
        <span class="header-name" id="hdr-name">Loading…</span>
        <span class="header-tagline" id="hdr-tagline"></span>
      </div>
    </div>
    <div class="header-right">
      <a href="/" class="back-to-chat" aria-label="Back to chat">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        Chat
      </a>
      <button class="theme-toggle" id="theme-toggle" aria-label="Switch to dark mode">
        <!-- icon injected by JS -->
      </button>
    </div>
  </div>
</header>

<!-- ── Hero ──────────────────────────────────────────────────────────────── -->
<section class="projects-hero">
  <p class="projects-hero-label">Portfolio</p>
  <h1 class="projects-hero-title" id="hero-title">Projects</h1>
  <p class="projects-hero-sub" id="hero-sub">
    A selection of work across logistics optimisation, AI systems, and full-stack development.
  </p>
</section>

<!-- ── Grid ──────────────────────────────────────────────────────────────── -->
<main class="projects-main" role="main">
  <div class="projects-grid" id="projects-grid" aria-label="Project list">
    <!-- Cards injected by JS -->
    <div class="project-skeleton"></div>
    <div class="project-skeleton"></div>
    <div class="project-skeleton"></div>
  </div>
</main>

<!-- ── Footer ────────────────────────────────────────────────────────────── -->
<footer class="projects-footer">
  <a href="/" class="projects-footer-link">
    ← Back to chat
  </a>
</footer>

<script src="/js/projects.js"></script>
</body>
</html>
